<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estilizando listas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Para estilizar uma lista, usa-se o "list-style-type" </h2>

    <h2>também é possivel usar um ícone na lista, para isso usa-se a propriedade "list-style-image: url('./ imagem.png')"</h2>
    
    <ul>
        <li>item</li>
        <li>item</li>
        <li>item</li>
    </ul>
    <ol>
        <li>item</li>
        <li>item</li>
        <li>item</li>
    </ol>
</body>
</html>
