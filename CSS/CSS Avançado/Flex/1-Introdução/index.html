<!-- 
 
    o display flex trabalha com o conceito de pai e filho
    onde o pai se chama flex-container
    e os filhos se chamam flex-items

    a propriedade display:flex; sempre fica no pai e estilizará todos os seus filhos, quando a gente quiser posicionar/definir o comportamento (posicionamento) dos filhos, devemos mexer no pai (usar propriedades CSS no pai). 


    <div class="container" > <--pai
        <div>1</div> \
        <div>2</div>  --- filhos
        <div>3</div> /
    </div>





-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>
</body>
</html>
