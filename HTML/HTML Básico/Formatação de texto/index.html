<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>títulos e parágrafos</title>
</head>
<body>

    <h1>Fortmatações de texto</h1>
    <p>Texto em <b>negrito</b> com a tag b ou com a tag strong</p>
    <p>esse texto será em <i>itálico</i> com a tag i</p>
    <p>este texto será <u>sublinhado</u> com a tag u</p>
    <p>este texto será <s>riscado</s> com a tag s</p>
    <p>teste git hub</p>


</body>
</html>
