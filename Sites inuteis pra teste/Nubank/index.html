<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nubank</title>
    <link rel="stylesheet" href="./src/styles/style.css" />
    <link rel="stylesheet" href="./src/styles/reset.css" />
  </head>
  <body>
    <header>
        <div class="header-start">
            <img src="./src/images/user-icon.png" alt="" class="user-picture">
            <ul>
                <li><img src="./src/images/eye-icon.png" alt="" class="icon"></li>
                <li><img src="./src/images/help-icon.png" alt="" class="icon"></li>
                <li><img src="./src/images/shield-icon.png" alt="" class="icon"></li>
            </ul>
        </div>
        <h1>Olá, Nicolas</h1>
    </header>
    <main>
      
      <section class="section-1">
        <div class="account">
          <h3>Saldo em conta </h3> <h4 class="btn">></h4>
        </div>
        <div class="money">
          <h4>R$5.450.123,10</h4>
        </div>
      </section>

      <section class="section-2">
        <div class="pay-itens">
          <div class="item">
            <img src="./src/images/pix-icon.png" alt="" class="pix-icon">
            <h5>Área Pix e <br>transferir</h5>
          </div>
            <div class="item">
              <img src="./src/images/bars-code-icon.png" alt="" class="pix-icon">
              <h5>Pagar</h5>
            </div>
            <div class="item">
              <img src="./src/images/qr-code-icon.png" alt="" class="pix-icon">
              <h5>Pagar com Pix <br> QR code</h5>
            </div>
            <div class="item">
              <img src="./src/images/smartphone-icon.png" alt="" class="pix-icon">
              <h5>Recarga de <br> celular</h5>
            </div>
          </div>

          <div class="my-cards">
            <img src="./src/images/cards-icon.png" alt="" class="icon">
            <h4>Meus cartões</h4>
          </div>
          </section>
    </main>

    <footer></footer>

    <script src="src/script/script.js"></script>
  </body>
</html>
