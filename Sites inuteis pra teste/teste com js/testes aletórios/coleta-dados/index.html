<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>coleta-dados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Coleta de Dados</h1>
    <p>Este é um exemplo de coleta de dados com JavaScript.</p>
    
    <form id="dataForm">
        <input type="text" id="name" name="name" required placeholder="Nome">
        <input type="email" id="email" name="email" required placeholder="Email">
        <input type="tel" name="telefone" id="telefone" required placeholder="Telefone">
        <input type="password" name="senha" id="senha" required placeholder="Senha">
        <button type="submit">Enviar</button>
    </form>

    <script src="script.js"></script>
</body>
</html>
