<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Avançada Preto e Dourado</title>
  <style>
    body {
      background-color: #000;
      color: #FFD700;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .calculator {
      background-color: #111;
      border: 2px solid #FFD700;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 0 20px #FFD70088;
      transition: box-shadow 0.4s ease, transform 0.4s ease;
    }

    .calculator:hover {
      box-shadow: 0 0 30px #FFD700cc, 0 0 60px #FFD70055;
      transform: scale(1.02);
    }

    .display {
      background-color: #000;
      color: #FFD700;
      font-size: 2em;
      padding: 10px;
      margin-bottom: 20px;
      border: 1px solid #FFD700;
      border-radius: 5px;
      text-align: right;
      min-height: 50px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 60px);
      gap: 10px;
    }

    button {
      background-color: #222;
      color: #FFD700;
      border: 1px solid #FFD700;
      border-radius: 5px;
      font-size: 1.5em;
      cursor: pointer;
      padding: 15px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    button::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 200%;
      height: 100%;
      background: linear-gradient(120deg, transparent, #FFD70088, transparent);
      transition: all 0.5s;
    }

    button:active::after,
    button:hover::after {
      left: 100%;
    }

    button:hover {
      background-color: #333;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display" id="display">0</div>
    <div class="buttons">
      <button onclick="clearDisplay()">C</button>
      <button onclick="appendValue('/')">/</button>
      <button onclick="appendValue('*')">*</button>
      <button onclick="deleteLast()">DEL</button>
      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>
      <button onclick="appendValue('-')">-</button>
      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>
      <button onclick="appendValue('+')">+</button>
      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
      <button onclick="appendValue('3')">3</button>
      <button onclick="calculate()">=</button>
      <button onclick="appendValue('0')" style="grid-column: span 2;">0</button>
      <button onclick="appendValue('.')">.</button>
      <button onclick="appendValue('^')">^</button>
    </div>
  </div>

  <script>
    const display = document.getElementById('display');

    function appendValue(value) {
      if (display.innerText === '0') {
        display.innerText = value;
      } else {
        display.innerText += value;
      }
    }

    function clearDisplay() {
      display.innerText = '0';
    }

    function deleteLast() {
      display.innerText = display.innerText.slice(0, -1) || '0';
    }

    function calculate() {
      try {
        const input = display.innerText.replace(/\^/g, '**');
        const result = math.evaluate(input);
        display.innerText = result;
      } catch {
        display.innerText = 'Erro';
      }
    }

    // Suporte ao teclado físico
    document.addEventListener('keydown', (e) => {
      const key = e.key;
      if (/\d|\.|\+|\-|\*|\/|\^/.test(key)) {
        appendValue(key);
      } else if (key === 'Enter') {
        calculate();
      } else if (key === 'Backspace') {
        deleteLast();
      } else if (key.toLowerCase() === 'c') {
        clearDisplay();
      }
    });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
</body>
</html>
