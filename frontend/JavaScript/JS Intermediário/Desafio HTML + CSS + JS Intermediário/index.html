<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/css/style.css">
    <link rel="stylesheet" href="./src/css/reset.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Formulário com validação</title>
</head>
<body>
    <section class="container">
        <div class="mensage">
            <h1>FICOU COM DÚVIDA? <br> NOS MANDE UMA MENSAGEM!</h1>
            <p>caso tenha ficado com qualquer dúvida <br> basta nos mandar uma mensagem <br>e entraremos em contato em menos de 24h.</p>
        </div>

        <form action="" class="form">
            <input type="text" name="name" id="name" placeholder="Nome completo *" class="inputs">
            <input type="email" name="email" id="email" placeholder="Email *" class="inputs">
            <input type="tel" name="tel" id="tel" placeholder="Telefone *" class="inputs">
            <input type="text" placeholder="Mensagem *" id="campo-mensagem" class="inputs">

            <p>* campos obrigatórios</p>  
            <span  id="btn">Enviar</span> 
        </form>
    </section>
    <script src="src/script/script.js"></script>
</body>
</html>
