<!-- 
    o grid é uma propriedadeusada para criar layouts, grid em português significa grade,
    é uma forma de organizar os elementos de uma página em linhas e colunas.

    resumindo,  o grid é um sistema bidimensional baseado em grade

    PROPRIEDADES DO GRID:

    grid-template-columns: define as colunas do grid: nessa propriedade você define quantas colunas terá o grid e qual a largura de cada uma delas.

    grid-template-rows: define as linhas do grid: nessa propriedade você define quantas linhas terá o grid e qual a altura de cada uma delas.
-->
